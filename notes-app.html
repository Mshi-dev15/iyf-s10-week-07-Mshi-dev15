<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Notes App</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button#addBtn { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button#addBtn:hover { background: #0056b3; }
    
    ul { list-style: none; padding: 0; }
    li { 
      background: #f9f9f9; 
      border: 1px solid #ddd; 
      padding: 10px; 
      margin-bottom: 8px; 
      border-radius: 4px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .delete-btn { 
      background: #dc3545; 
      color: white; 
      border: none; 
      padding: 5px 10px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.8em;
    }
    .empty-msg { color: #888; text-align: center; font-style: italic; }
  </style>
</head>
<body>

  <h2>📝 My Notes</h2>

  <div class="input-group">
    <input type="text" id="noteInput" placeholder="Write a note..." />
    <button id="addBtn">Save</button>
  </div>

  <ul id="notesList"></ul>

  <script>
    // --- 1. Configuration ---
    const STORAGE_KEY = "my_simple_notes";

    // --- 2. Helper Functions ---
    function getNotes() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    // --- 3. Core Logic ---
    function addNote() {
      const input = document.getElementById("noteInput");
      const text = input.value.trim();

      if (!text) return; // Don't save empty notes

      const notes = getNotes();
      notes.push({ id: Date.now(), text: text });
      
      saveNotes(notes);
      input.value = ""; // Clear input
      renderNotes();    // Update UI
    }

    function deleteNote(id) {
      let notes = getNotes();
      // Keep all notes EXCEPT the one with this ID
      notes = notes.filter(note => note.id !== id);
      
      saveNotes(notes);
      renderNotes();
    }

    // --- 4. UI Rendering ---
    function renderNotes() {
      const list = document.getElementById("notesList");
      const notes = getNotes();

      if (notes.length === 0) {
        list.innerHTML = '<li class="empty-msg">No notes yet! 📝</li>';
        return;
      }

      // Create HTML for each note
      list.innerHTML = notes.map(note => `
        <li>
          <span>${note.text}</span>
          <button class="delete-btn" data-id="${note.id}">Delete</button>
        </li>
      `).join("");
    }

    // --- 5. Event Listeners ---
    
    // Add button click
    document.getElementById("addBtn").addEventListener("click", addNote);

    // Allow pressing "Enter" key in input
    document.getElementById("noteInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") addNote();
    });

    // Handle Delete clicks (Event Delegation)
    document.getElementById("notesList").addEventListener("click", (e) => {
      if (e.target.classList.contains("delete-btn")) {
        const id = Number(e.target.dataset.id);
        deleteNote(id);
      }
    });

    // --- 6. Initial Load ---
    renderNotes();
  </script>

</body>
</html>
