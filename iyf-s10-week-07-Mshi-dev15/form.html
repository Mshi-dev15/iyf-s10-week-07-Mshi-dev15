<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task 13.3 - Auto Save Form</title>
</head>
<body>

  <h2>📋 Contact Form</h2>
  <p>This form auto-saves as you type using sessionStorage!</p>

  <form id="contact-form">

    <div>
      <label>Name</label><br />
      <input type="text" name="name" placeholder="Your name" />
    </div>

    <div>
      <label>Email</label><br />
      <input type="text" name="email" placeholder="Your email" />
    </div>

    <div>
      <label>Message</label><br />
      <textarea name="message" placeholder="Your message"></textarea>
    </div>

    <button type="submit">Submit</button>

  </form>

  <p id="status"></p>

  <script>
const form = document.getElementById("contact-form");

// Get all inputs and textareas inside the form
const inputs = form.querySelectorAll("input, textarea");

inputs.forEach(input => {
  // When page loads, check if we have saved data for this field
  const saved = sessionStorage.getItem("form_" + input.name);
  if (saved) {
    input.value = saved; // restore it!
  }

  // Every time the user types, save immediately
  input.addEventListener("input", () => {
    sessionStorage.setItem("form_" + input.name, input.value);
  });
});

// When form is submitted, clear all saved data
form.addEventListener("submit", function(e) {
  e.preventDefault();

  // Clear sessionStorage for each field
  inputs.forEach(input => {
    sessionStorage.removeItem("form_" + input.name);
    input.value = ""; // also clear the input visually
  });

  document.getElementById("status").textContent = "✅ Form submitted and saved data cleared!";
});

  </script>
</body>
</html>
