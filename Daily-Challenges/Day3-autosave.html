<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Save Form</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f9;
        }

        h2 { color: #333; }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h2>📝 Draft Auto-Saver</h2>
    <p>Type below. If you refresh, your text will remain!</p>

    <form id="draft-form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Enter title...">
        </div>

        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" placeholder="Start writing here..."></textarea>
        </div>

        <button type="submit">Submit Form</button>
    </form>

    <div id="status-msg" class="status"></div>

    <script>
        // day3.js

const form = document.getElementById('draft-form');
const titleInput = document.getElementById('title');
const contentInput = document.getElementById('content');
const statusMsg = document.getElementById('status-msg');

const STORAGE_KEY_TITLE = 'draft_title';
const STORAGE_KEY_CONTENT = 'draft_content';

// 1. Load saved data on page load
window.addEventListener('DOMContentLoaded', () => {
    const savedTitle = localStorage.getItem(STORAGE_KEY_TITLE);
    const savedContent = localStorage.getItem(STORAGE_KEY_CONTENT);

    if (savedTitle) titleInput.value = savedTitle;
    if (savedContent) contentInput.value = savedContent;
});

// 2. Save data whenever the user types
function saveDraft() {
    localStorage.setItem(STORAGE_KEY_TITLE, titleInput.value);
    localStorage.setItem(STORAGE_KEY_CONTENT, contentInput.value);
    
    // Optional: Show a subtle "Saved" message
    statusMsg.textContent = '💾 Draft saved automatically...';
    setTimeout(() => {
        statusMsg.textContent = '';
    }, 2000);
}

// Attach listeners to both inputs
titleInput.addEventListener('input', saveDraft);
contentInput.addEventListener('input', saveDraft);

// 3. Clear storage when form is successfully submitted
form.addEventListener('submit', (e) => {
    e.preventDefault(); // Prevent actual submission for this demo
    
    // Simulate sending data...
    alert('Form Submitted! Draft cleared.');
    
    // Clear localStorage
    localStorage.removeItem(STORAGE_KEY_TITLE);
    localStorage.removeItem(STORAGE_KEY_CONTENT);
    
    // Clear inputs
    titleInput.value = '';
    contentInput.value = '';
    statusMsg.textContent = '✅ Form submitted and draft cleared.';
});
    </script>
</body>
</html>
